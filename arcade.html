<!DOCTYPE html>
<html lang="en-ZA">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Lockshot | Arcade Game</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js" defer></script>
</head>
<body class="single-game-body arcade-game-page">
  <header class="topbar is-scrolled"><a class="brand" href="index.html"><span class="brand-lock">Lock</span><span class="brand-shot">shot</span><span class="brand-score" aria-hidden="true">+30</span></a><div class="wallet-topbar-chip" id="arcade-wallet-chip" style="display:none"><span>💳</span><span id="arcade-wallet-bal">R0.00</span></div><nav class="desktop-nav"><a href="game.html">Games</a><a href="competitions.html">Competitions</a></nav></header>
  <main>
    <section class="game-section single-game-page">
      <div class="game-head"><div><span data-arcade-kicker>Arcade</span><h2 data-arcade-title>Traffic Dodge</h2></div><strong data-arcade-status>Ready</strong></div>
      <div class="arcade-shell">
        <div class="arcade-intro" data-arcade-intro>
          <span class="arcade-intro-kicker" data-arcade-intro-kicker></span>
          <h2 class="arcade-intro-title" data-arcade-intro-title></h2>
          <p class="arcade-intro-desc" data-arcade-intro-desc></p>
          <button type="button" class="arcade-intro-btn" data-arcade-intro-start>START GAME</button>
        </div>
        <canvas class="arcade-canvas" width="360" height="520" data-arcade-canvas></canvas>
        <div class="arcade-hud">
          <article><span>Score</span><strong data-arcade-score>0</strong></article>
          <article><span>Time</span><strong data-arcade-time>30.0s</strong></article>
          <article><span>High</span><strong data-arcade-high>0</strong></article>
        </div>
        <div class="arcade-controls">
          <button type="button" data-arcade-left>Left</button>
          <button type="button" data-arcade-start>Start</button>
          <button type="button" data-arcade-right>Right</button>
        </div>
        <p data-arcade-note>Move left and right. Stay alive and chase the leaderboard.</p>
        <a class="game-switch-link" href="game.html">Choose another game</a>
      </div>
    </section>
  </main>
  <script>
    (() => {
      const params = new URLSearchParams(location.search);
      const requestedMode = params.get("game") || "car";
      const removedModes = new Set(["mines", "orbit"]);
      const mode = removedModes.has(requestedMode) ? "car" : requestedMode;
      const configMap = {
        car: { title: "Traffic Dodge", kicker: "Car game", note: "Use left and right only. Dodge cars. Every wave has a route through.", player: "#04f529", obstacle: "#ff3d66" },
        dino: { title: "Jump Runner", kicker: "No-internet style", note: "Tap Start or tap the canvas to jump over obstacles.", player: "#04f529", obstacle: "#ffffff" },
        boxball: { title: "Box Ball", kicker: "Edge survival", note: "Drag the ball or use left/right. Touch the edge and the round is over.", player: "#04f529", obstacle: "#ffffff" },
        color: { title: "Color Rush", kicker: "Reaction game", note: "Move onto the glowing colour before the timer snaps.", player: "#04f529", obstacle: "#ff3d66" },
        memory: { title: "8 Colour Tower", kicker: "Memory tower", note: "Study the 8-colour tower, then tap the colours in the same top-to-bottom order.", player: "#04f529", obstacle: "#ff3d66" },
        tunnel: { title: "Tunnel Rush", kicker: "Steady hand", note: "Hold the screen or hold Space to float up. Release to fall. Don't hit the walls!", player: "#04f529", obstacle: "#ff3d66" },
        burger: { title: "Burger Stack", kicker: "Food challenge", note: "Tap to drop each ingredient onto the burger. Build it perfectly!", player: "#04f529", obstacle: "#ff3d66" }
      };
      const cfg = configMap[mode] || configMap.car;
      const canvas = document.querySelector("[data-arcade-canvas]");
      const ctx = canvas.getContext("2d");
      const stageWidth = 360;
      const stageHeight = 520;
      const pixelRatio = Math.min(window.devicePixelRatio || 1, 2);
      canvas.width = stageWidth * pixelRatio;
      canvas.height = stageHeight * pixelRatio;
      ctx.setTransform(pixelRatio, 0, 0, pixelRatio, 0, 0);
      const title = document.querySelector("[data-arcade-title]");
      const kicker = document.querySelector("[data-arcade-kicker]");
      const status = document.querySelector("[data-arcade-status]");
      const scoreEl = document.querySelector("[data-arcade-score]");
      const highEl = document.querySelector("[data-arcade-high]");
      const timeEl = document.querySelector("[data-arcade-time]");
      const note = document.querySelector("[data-arcade-note]");
      const start = document.querySelector("[data-arcade-start]");
      const left = document.querySelector("[data-arcade-left]");
      const right = document.querySelector("[data-arcade-right]");
      title.textContent = cfg.title;
      kicker.textContent = cfg.kicker;
      note.textContent = cfg.note;
      const introEl = document.querySelector("[data-arcade-intro]");
      const introStartBtn = document.querySelector("[data-arcade-intro-start]");
      document.querySelector("[data-arcade-intro-kicker]").textContent = cfg.kicker.toUpperCase();
      document.querySelector("[data-arcade-intro-title]").textContent = cfg.title;
      document.querySelector("[data-arcade-intro-desc]").textContent = cfg.note;
      function dismissIntro() { introEl.hidden = true; }
      introStartBtn.addEventListener("click", () => { dismissIntro(); reset(); });

      let running = false;
      let score = 0;
      const highKey = `lockshot${mode}HighScore`;
      let high = normalizeStoredHigh(Number(localStorage.getItem(highKey) || localStorage.getItem(`lockshotHigh_${mode}`) || 0));
      let timeLeft = 30;
      let lane = 1;
      let y = 430;
      let vy = 0;
      let ball = { x: 180, y: 270, vx: 120, vy: 90 };
      let obstacles = [];
      let targetLane = 1;
      let colorTimer = 1.1;
      let spawnTimer = 0;
      let roadOffset = 0;
      let draggingBall = false;
      let runnerStep = 0;
      const memoryColors = [
        { name: "blue", color: "#1d6ff2" },
        { name: "red", color: "#f43f5e" },
        { name: "green", color: "#22c55e" },
        { name: "orange", color: "#f97316" },
        { name: "pink", color: "#ec4899" },
        { name: "yellow", color: "#facc15" },
        { name: "purple", color: "#8b5cf6" },
        { name: "teal", color: "#14b8a6" }
      ];
      let memorySequence = [];
      let memoryIndex = 0;
      let memoryPhase = "show";
      let memoryShowIndex = 0;
      let memoryPhaseTimer = 0;
      let memoryWrong = null;
      let last = 0;
      let rafId = 0;
      const particles = [];
      const scorePops = [];
      let speedLinesOffset = 0;
      // Tunnel Rush state
      let tunnelY = 260;
      let tunnelVY = 0;
      let tunnelOffset = 0;
      let tunnelHolding = false;
      let tunnelGrace = 0;
      // Burger Stack state
      const burgerParts = [
        { name: "Bottom Bun", color: "#d4922a", topColor: "#f0ac48", botColor: "#a87018", h: 22 },
        { name: "Patty",      color: "#7b3f12", topColor: "#9a5020", botColor: "#4c2408", h: 20 },
        { name: "Cheese",     color: "#ffc832", topColor: "#ffe060", botColor: "#d4a018", h: 8  },
        { name: "Lettuce",    color: "#4ab828", topColor: "#70d840", botColor: "#2c8010", h: 16 },
        { name: "Tomato",     color: "#e83e28", topColor: "#f85040", botColor: "#b01808", h: 12 },
        { name: "Onion",      color: "#c47abe", topColor: "#dc90d8", botColor: "#8c3898", h: 8  },
        { name: "Top Bun",    color: "#d4922a", topColor: "#f0ac48", botColor: "#a87018", h: 26 }
      ];
      let burgerLayers = [{ x: 80, w: 200, y: 490, partIdx: -1 }];
      let burgerSlider = { x: 0, w: 200, dir: 1, speed: 130 };
      let burgerPartIdx = 0;
      let burgerCamY = 0;
      let burgerTargetCamY = 0;
      highEl.textContent = high;

      function drawCityBg() {
        const sky = ctx.createLinearGradient(0, 0, 0, 210);
        sky.addColorStop(0, "#04060e");
        sky.addColorStop(1, "#080f14");
        ctx.fillStyle = sky;
        ctx.fillRect(0, 0, 360, 210);
        ctx.beginPath();
        ctx.arc(308, 36, 18, 0, Math.PI * 2);
        ctx.fillStyle = "rgba(215,235,255,0.90)";
        ctx.shadowBlur = 32;
        ctx.shadowColor = "rgba(180,210,255,0.65)";
        ctx.fill();
        ctx.shadowBlur = 0;
        const starData = [[18,10],[55,6],[98,19],[144,4],[190,15],[238,7],[272,22],[318,10],[344,5],[36,28],[168,28],[295,14],[205,33],[72,33]];
        starData.forEach(([sx, sy]) => {
          ctx.beginPath();
          ctx.arc(sx, sy, 0.9, 0, Math.PI * 2);
          ctx.fillStyle = "rgba(255,255,255,0.82)";
          ctx.fill();
        });
        const bldgs = [{x:0,w:36,h:110},{x:32,w:20,h:72},{x:48,w:42,h:138},{x:86,w:18,h:88},{x:100,w:30,h:104},{x:126,w:44,h:126},{x:166,w:20,h:78},{x:182,w:34,h:114},{x:212,w:24,h:92},{x:232,w:50,h:148},{x:278,w:28,h:98},{x:302,w:18,h:66},{x:316,w:44,h:122}];
        bldgs.forEach(b => {
          ctx.fillStyle = "#030609";
          ctx.fillRect(b.x, 210 - b.h, b.w, b.h);
          const cols = Math.floor(b.w / 9);
          const rows = Math.floor((b.h - 10) / 11);
          for (let r = 0; r < rows; r++) {
            for (let c = 0; c < cols; c++) {
              if ((b.x * 7 + r * 13 + c * 31) % 5 < 2) {
                ctx.fillStyle = "rgba(255,215,110,0.52)";
                ctx.fillRect(b.x + 3 + c * 9, 210 - b.h + 6 + r * 11, 4, 5);
              }
            }
          }
        });
        ctx.fillStyle = "#060d0c";
        ctx.fillRect(0, 206, 360, 8);
      }

      function drawNeonRoad() {
        ctx.fillStyle = "#0b1510";
        ctx.fillRect(0, 0, 360, 520);
        roadOffset = (roadOffset + 8) % 80;
        const surf = ctx.createLinearGradient(34, 0, 326, 0);
        surf.addColorStop(0, "rgba(255,255,255,0.04)");
        surf.addColorStop(0.5, "rgba(255,255,255,0.08)");
        surf.addColorStop(1, "rgba(255,255,255,0.04)");
        ctx.fillStyle = surf;
        ctx.fillRect(34, 0, 292, 520);
        const persp = ctx.createLinearGradient(0, 0, 0, 100);
        persp.addColorStop(0, "rgba(11,21,16,0.78)");
        persp.addColorStop(1, "rgba(0,0,0,0)");
        ctx.fillStyle = persp;
        ctx.fillRect(34, 0, 292, 100);
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        ctx.fillRect(118, 0, 2, 520);
        ctx.fillRect(238, 0, 2, 520);
        ctx.shadowBlur = 12;
        ctx.shadowColor = "rgba(4,245,41,0.65)";
        ctx.fillStyle = "rgba(4,245,41,0.60)";
        ctx.fillRect(34, 0, 3, 520);
        ctx.fillRect(321, 0, 3, 520);
        ctx.shadowBlur = 7;
        ctx.shadowColor = "rgba(4,245,41,0.38)";
        ctx.fillStyle = "rgba(4,245,41,0.44)";
        for (let i = -80; i < 560; i += 80) {
          ctx.fillRect(176, i + roadOffset, 8, 34);
        }
        ctx.shadowBlur = 0;
      }

      function drawSpeedLines(dt, gameScore) {
        speedLinesOffset = (speedLinesOffset + dt * Math.min(900, 180 + gameScore / 4)) % 600;
        const intensity = Math.min(1, gameScore / 900);
        if (intensity < 0.1) return;
        ctx.save();
        ctx.globalAlpha = intensity * 0.25;
        ctx.strokeStyle = "rgba(4,245,41,0.9)";
        ctx.lineWidth = 1;
        for (let i = 0; i < 10; i++) {
          const x = 54 + ((i * 28 + 10) % 252);
          const baseY = ((speedLinesOffset * 0.85 + i * 62) % 600) - 50;
          const len = 24 + intensity * 52;
          ctx.beginPath();
          ctx.moveTo(x, baseY);
          ctx.lineTo(x - (x - 180) * 0.05, baseY + len);
          ctx.stroke();
        }
        ctx.restore();
      }

      function addParticle(x, y, color, vxSpread = 120, vySpread = 120, size = 4) {
        if (particles.length > 80) return;
        particles.push({ x, y, vx: (Math.random() - 0.5) * vxSpread, vy: (Math.random() - 0.5) * vySpread - 30, life: 0.45 + Math.random() * 0.4, size: size + Math.random() * 3, color });
      }

      function addExplosion(x, y, color) {
        for (let i = 0; i < 22; i++) {
          const angle = (i / 22) * Math.PI * 2;
          const speed = 70 + Math.random() * 180;
          if (particles.length < 100) {
            particles.push({ x, y, vx: Math.cos(angle) * speed, vy: Math.sin(angle) * speed - 40, life: 0.55 + Math.random() * 0.45, size: 3 + Math.random() * 6, color });
          }
        }
        for (let i = 0; i < 8; i++) {
          const angle = (i / 8) * Math.PI * 2;
          if (particles.length < 100) {
            particles.push({ x, y, vx: Math.cos(angle) * 50, vy: Math.sin(angle) * 50, life: 0.7 + Math.random() * 0.3, size: 2 + Math.random() * 3, color: "#ff3d66" });
          }
        }
      }

      function updateParticles(dt) {
        for (let i = particles.length - 1; i >= 0; i--) {
          const p = particles[i];
          p.x += p.vx * dt;
          p.y += p.vy * dt;
          p.vy += 220 * dt;
          p.life -= dt;
          if (p.life <= 0) particles.splice(i, 1);
        }
      }

      function drawParticles() {
        particles.forEach(p => {
          const alpha = Math.max(0, p.life) * 0.88;
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 10;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.beginPath();
          ctx.arc(p.x, p.y, p.size * Math.sqrt(Math.max(0, p.life)), 0, Math.PI * 2);
          ctx.fill();
          ctx.restore();
        });
      }

      function addScorePop(x, y, text, color = "#04f529") {
        if (scorePops.length < 12) scorePops.push({ x, y, text, color, life: 1.0, vy: -80 });
      }

      function updateDrawScorePops(dt) {
        for (let i = scorePops.length - 1; i >= 0; i--) {
          const p = scorePops[i];
          p.y += p.vy * dt;
          p.vy *= (1 - 3.5 * dt);
          p.life -= dt;
          if (p.life <= 0) { scorePops.splice(i, 1); continue; }
          const alpha = Math.min(1, p.life * 2.2);
          ctx.save();
          ctx.globalAlpha = alpha;
          ctx.shadowBlur = 18;
          ctx.shadowColor = p.color;
          ctx.fillStyle = p.color;
          ctx.font = "900 22px sans-serif";
          ctx.textAlign = "center";
          ctx.textBaseline = "middle";
          ctx.fillText(p.text, p.x, p.y);
          ctx.restore();
        }
      }

      function reset() {
        cancelAnimationFrame(rafId);
        running = true;
        score = 0;
        particles.length = 0;
        scorePops.length = 0;
        speedLinesOffset = 0;
        timeLeft = 30;
        lane = 1;
        y = 430;
        vy = 0;
        ball = { x: 180, y: 270, vx: 130, vy: 110 };
        obstacles = [];
        targetLane = Math.floor(Math.random() * 3);
        colorTimer = 1.1;
        spawnTimer = mode === "dino" ? 3.5 : 0;
        roadOffset = 0;
        runnerStep = 0;
        tunnelOffset = 0; tunnelVY = 0; tunnelHolding = false; tunnelGrace = 0.55;
        tunnelY = 260 + 70*Math.sin(80*0.021) + 34*Math.sin(80*0.053+1.15) + 16*Math.sin(80*0.011+0.4);
        burgerLayers = [{ x: 80, w: 200, y: 490, partIdx: -1 }];
        burgerSlider = { x: 0, w: 200, dir: 1, speed: 130 };
        burgerPartIdx = 0; burgerCamY = 0; burgerTargetCamY = 0;
        memorySequence = [...memoryColors.keys()].sort(() => Math.random() - 0.5);
        memoryIndex = 0;
        memoryPhase = "show";
        memoryShowIndex = 0;
        memoryPhaseTimer = 10.0;
        memoryWrong = null;
        if (mode === "memory") timeLeft = 30;
        status.textContent = mode === "memory" ? "Watch" : "Live";
        last = performance.now();
        rafId = requestAnimationFrame(tick);
      }

      function finish(text = "Out") {
        running = false;
        status.textContent = text;
        high = Math.max(high, scoreToPoints(score));
        localStorage.setItem(highKey, String(high));
        highEl.textContent = high;
      }

      function scoreToPoints(value) {
        if (!value) return 0;
        const maxScore = mode === "memory" ? 1600 : 1500;
        return Math.max(1, Math.min(30, Math.round((value / maxScore) * 30)));
      }

      function normalizeStoredHigh(value) {
        if (!value) return 0;
        return value > 30 ? Math.max(1, Math.min(30, Math.round((value / 1500) * 30))) : value;
      }

      function laneX(value) {
        return [90, 180, 270][value];
      }

      function roundRect(x, yPos, w, h, r) {
        ctx.beginPath();
        ctx.moveTo(x + r, yPos);
        ctx.arcTo(x + w, yPos, x + w, yPos + h, r);
        ctx.arcTo(x + w, yPos + h, x, yPos + h, r);
        ctx.arcTo(x, yPos + h, x, yPos, r);
        ctx.arcTo(x, yPos, x + w, yPos, r);
        ctx.closePath();
      }

      function drawBackground(color = "#071312") {
        ctx.fillStyle = color;
        ctx.fillRect(0, 0, 360, 520);
      }

      function drawRoad() {
        drawBackground("#071312");
        roadOffset = (roadOffset + 8) % 80;
        ctx.fillStyle = "rgba(255,255,255,.08)";
        ctx.fillRect(34, 0, 292, 520);
        ctx.fillStyle = "rgba(255,255,255,.2)";
        ctx.fillRect(118, 0, 4, 520);
        ctx.fillRect(238, 0, 4, 520);
        ctx.fillStyle = "rgba(4,245,41,.34)";
        for (let i = -80; i < 560; i += 80) {
          ctx.fillRect(176, i + roadOffset, 8, 34);
        }
      }

      function shadeColor(hex, amount) {
        const clean = hex.replace("#", "");
        const number = parseInt(clean, 16);
        const r = Math.max(0, Math.min(255, (number >> 16) + amount));
        const g = Math.max(0, Math.min(255, ((number >> 8) & 255) + amount));
        const b = Math.max(0, Math.min(255, (number & 255) + amount));
        return `rgb(${r}, ${g}, ${b})`;
      }

      function drawBlockCube(x, yPos, size, depth, color, label, reveal, isWrong = false) {
        const faceColor = reveal ? color : "#263134";
        const topColor = reveal ? shadeColor(color, 38) : "#3a4548";
        const sideColor = reveal ? shadeColor(color, -44) : "#151d20";
        ctx.save();
        ctx.shadowBlur = isWrong ? 28 : reveal ? 12 : 0;
        ctx.shadowColor = reveal ? color : "transparent";

        ctx.fillStyle = topColor;
        ctx.beginPath();
        ctx.moveTo(x, yPos);
        ctx.lineTo(x + depth, yPos - depth);
        ctx.lineTo(x + size + depth, yPos - depth);
        ctx.lineTo(x + size, yPos);
        ctx.closePath();
        ctx.fill();

        ctx.fillStyle = sideColor;
        ctx.beginPath();
        ctx.moveTo(x + size, yPos);
        ctx.lineTo(x + size + depth, yPos - depth);
        ctx.lineTo(x + size + depth, yPos + size - depth);
        ctx.lineTo(x + size, yPos + size);
        ctx.closePath();
        ctx.fill();

        const face = ctx.createLinearGradient(x, yPos, x + size, yPos + size);
        face.addColorStop(0, shadeColor(faceColor, reveal ? 16 : 8));
        face.addColorStop(0.54, faceColor);
        face.addColorStop(1, shadeColor(faceColor, reveal ? -28 : -18));
        ctx.fillStyle = face;
        ctx.fillRect(x, yPos, size, size);

        ctx.strokeStyle = reveal ? "rgba(0,0,0,.26)" : "rgba(255,255,255,.08)";
        ctx.lineWidth = 2;
        ctx.strokeRect(x, yPos, size, size);

        ctx.shadowBlur = 0;
        ctx.fillStyle = reveal ? "rgba(255,255,255,.78)" : "rgba(255,255,255,.18)";
        ctx.font = `${Math.max(16, size * 0.43)}px sans-serif`;
        ctx.textAlign = "center";
        ctx.textBaseline = "middle";
        ctx.fillText(label, x + size / 2, yPos + size / 2 + 1);
        ctx.textAlign = "left";
        ctx.textBaseline = "alphabetic";
        ctx.restore();
      }

      function drawCar(x, yPos, color, scale = 1, isPlayer = false) {
        ctx.save();
        ctx.translate(x, yPos);
        ctx.scale(scale, scale);
        if (isPlayer) { ctx.shadowBlur = 18; ctx.shadowColor = color; }
        const bodyGrad = ctx.createLinearGradient(-20, -34, 20, 34);
        bodyGrad.addColorStop(0, shadeColor(color, 55));
        bodyGrad.addColorStop(0.42, color);
        bodyGrad.addColorStop(1, shadeColor(color, -35));
        ctx.fillStyle = bodyGrad;
        roundRect(-20, -34, 40, 68, 10);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(255,255,255,0.14)";
        roundRect(-15, -26, 10, 20, 4);
        ctx.fill();
        ctx.fillStyle = "rgba(140,200,255,0.72)";
        roundRect(-13, -20, 26, 16, 6);
        ctx.fill();
        ctx.strokeStyle = "rgba(255,255,255,0.14)";
        ctx.lineWidth = 0.8;
        ctx.stroke();
        ctx.fillStyle = "rgba(90,150,220,0.50)";
        roundRect(-14, 7, 28, 18, 6);
        ctx.fill();
        [[-25,-22],[-25,12],[18,-22],[18,12]].forEach(([wx, wy]) => {
          ctx.fillStyle = "#191919";
          roundRect(wx, wy, 7, 16, 3);
          ctx.fill();
          ctx.fillStyle = "#363636";
          roundRect(wx + 1, wy + 2, 5, 12, 2);
          ctx.fill();
        });
        if (isPlayer) {
          ctx.shadowBlur = 24;
          ctx.shadowColor = "rgba(255,248,180,0.95)";
          ctx.fillStyle = "rgba(255,252,200,0.96)";
          [[-13,28],[8,28]].forEach(([lx, ly]) => { roundRect(lx, ly, 6, 5, 2); ctx.fill(); });
          ctx.shadowColor = "rgba(255,38,38,0.92)";
          ctx.fillStyle = "rgba(255,44,44,0.92)";
          [[-13,-36],[8,-36]].forEach(([lx, ly]) => { roundRect(lx, ly, 6, 4, 1); ctx.fill(); });
          ctx.shadowBlur = 0;
        }
        ctx.restore();
      }

      function drawRunner(x, yPos, airborne = false) {
        const stride = airborne ? 0.9 : Math.sin(runnerStep) * 0.85;
        const bob = airborne ? 0 : Math.abs(Math.sin(runnerStep)) * 3;
        const cy = yPos - bob;
        ctx.save();
        // Ground shadow
        if (!airborne) {
          ctx.fillStyle = "rgba(0,0,0,0.22)";
          ctx.beginPath(); ctx.ellipse(x, yPos + 15, 13, 4, 0, 0, Math.PI * 2); ctx.fill();
        }
        // Hat brim
        ctx.fillStyle = "#e52213";
        ctx.shadowBlur = 10; ctx.shadowColor = "rgba(229,34,19,0.45)";

        // ── BACK LEG ──

        ctx.shadowBlur = 0;

        ctx.fillStyle = "rgba(255,255,255,0.22)";

        ctx.beginPath(); ctx.arc(14, -53, 3.2, 0, Math.PI * 2); ctx.fill();
        // Pupil

        ctx.beginPath(); ctx.arc(14.5, -53, 1.7, 0, Math.PI * 2); ctx.fill();

      function drawWoodBlock(o) {
        ctx.save();
        const grad = ctx.createLinearGradient(o.x, o.y, o.x + o.w, o.y + o.h);
        grad.addColorStop(0, "#d4913c");
        grad.addColorStop(0.35, "#b87028");
        grad.addColorStop(0.72, "#9c5c1c");
        grad.addColorStop(1, "#7a4412");
        ctx.fillStyle = grad;
        ctx.shadowBlur = 10;
        ctx.shadowColor = "rgba(180,110,30,0.55)";
        roundRect(o.x, o.y, o.w, o.h, 4); ctx.fill();
        ctx.shadowBlur = 0;
        // Wood grain
        ctx.strokeStyle = "rgba(70,35,8,0.28)";
        ctx.lineWidth = 1;
        for (let i = 1; i <= 3; i++) {
          const ly = o.y + (o.h / 4) * i;
          ctx.beginPath(); ctx.moveTo(o.x + 3, ly); ctx.lineTo(o.x + o.w - 3, ly); ctx.stroke();
        }
        // Top highlight
        const hl = ctx.createLinearGradient(o.x, o.y, o.x, o.y + 9);
        hl.addColorStop(0, "rgba(255,215,140,0.4)"); hl.addColorStop(1, "rgba(255,200,100,0)");
        ctx.fillStyle = hl;
        roundRect(o.x + 2, o.y + 1, o.w - 4, 9, 2); ctx.fill();
        // Left shine
        ctx.fillStyle = "rgba(255,210,130,0.18)";
        ctx.fillRect(o.x + 1, o.y + 3, 3, o.h - 6);
        // Bottom/right shadow
        ctx.fillStyle = "rgba(0,0,0,0.22)";
        ctx.fillRect(o.x + o.w - 3, o.y + 3, 3, o.h - 4);
        roundRect(o.x + 3, o.y + o.h - 4, o.w - 6, 4, 2); ctx.fill();
        ctx.restore();
      }

      function drawBurgerBg() {
        const bg = ctx.createLinearGradient(0, 0, 0, 520);
        bg.addColorStop(0, "#0a0608"); bg.addColorStop(0.5, "#12080a"); bg.addColorStop(1, "#08060a");
        ctx.fillStyle = bg; ctx.fillRect(0, 0, 360, 520);
        // Warm bokeh circles (food stall vibe)
        ctx.save(); ctx.globalAlpha = 0.06;
        ctx.fillStyle = "#ff9820"; ctx.beginPath(); ctx.arc(60, 120, 90, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ff4060"; ctx.beginPath(); ctx.arc(300, 380, 100, 0, Math.PI*2); ctx.fill();
        ctx.fillStyle = "#ffd030"; ctx.beginPath(); ctx.arc(220, 60, 60, 0, Math.PI*2); ctx.fill();
        ctx.restore();
        // Subtle tile pattern
        ctx.strokeStyle = "rgba(255,255,255,0.025)"; ctx.lineWidth = 1;
        for (let gx = 0; gx <= 360; gx += 40) { ctx.beginPath(); ctx.moveTo(gx,0); ctx.lineTo(gx,520); ctx.stroke(); }
        for (let gy = 0; gy <= 520; gy += 40) { ctx.beginPath(); ctx.moveTo(0,gy); ctx.lineTo(360,gy); ctx.stroke(); }

      function drawBurgerIngredient(x, y, w, partIdx, isSlider) {
        if (partIdx < 0) {
          // Plate
          ctx.save();
          ctx.fillStyle = "rgba(0,0,0,0.2)"; ctx.beginPath(); ctx.ellipse(x + w/2, y + 16, w/2 + 8, 9, 0, 0, Math.PI*2); ctx.fill();
          const pg = ctx.createLinearGradient(x, y, x, y + 14);
          pg.addColorStop(0, "#e8e8e8"); pg.addColorStop(1, "#b8b8b8");
          ctx.fillStyle = pg; ctx.beginPath(); ctx.ellipse(x + w/2, y + 6, w/2, 8, 0, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "rgba(255,255,255,0.5)"; ctx.beginPath(); ctx.ellipse(x + w/2 - 10, y + 4, w/2 - 20, 4, -0.2, 0, Math.PI); ctx.fill();
          ctx.restore(); return;
        }
        const p = burgerParts[partIdx % burgerParts.length];
        const r = Math.min(w / 3.5, p.h / 2 + 3);
        ctx.save();
        if (isSlider) { ctx.shadowBlur = 20; ctx.shadowColor = p.topColor; }
        // Drop shadow
        ctx.fillStyle = "rgba(0,0,0,0.25)";
        roundRect(x + 4, y + 5, w, p.h, r); ctx.fill();
        // Body gradient
        const bg2 = ctx.createLinearGradient(x, y, x, y + p.h);
        bg2.addColorStop(0, p.topColor); bg2.addColorStop(1, p.botColor);
        ctx.fillStyle = bg2; roundRect(x, y, w, p.h, r); ctx.fill();
        // Top highlight
        ctx.fillStyle = "rgba(255,255,255,0.22)";
        roundRect(x + 4, y + 2, w - 8, Math.max(3, p.h * 0.35), r - 2); ctx.fill();
        // Ingredient details
        if (p.name === "Patty") {
          ctx.strokeStyle = "rgba(40,12,2,0.45)"; ctx.lineWidth = 1.5;
          for (let gi = 0; gi < 4; gi++) {
            const gx = x + 10 + gi * (w - 20) / 3;
            ctx.beginPath(); ctx.moveTo(gx, y + 3); ctx.lineTo(gx + 6, y + p.h - 3); ctx.stroke();
          }
        }
        if (p.name === "Cheese") {
          ctx.fillStyle = p.botColor;
          ctx.beginPath(); ctx.moveTo(x, y + p.h); ctx.lineTo(x - 6, y + p.h + 6); ctx.lineTo(x + 4, y + p.h); ctx.fill();
          ctx.beginPath(); ctx.moveTo(x + w, y + p.h); ctx.lineTo(x + w + 6, y + p.h + 6); ctx.lineTo(x + w - 4, y + p.h); ctx.fill();
        }
        if (p.name === "Lettuce") {
          ctx.fillStyle = p.topColor;
          for (let lx = x + 3; lx < x + w - 3; lx += 12) {
            ctx.beginPath(); ctx.arc(lx + 6, y, 6, Math.PI, 0); ctx.fill();
          }
        }
        if (p.name === "Tomato") {
          ctx.fillStyle = "rgba(255,255,255,0.12)";
          ctx.beginPath(); ctx.moveTo(x + w/2, y + 2); ctx.lineTo(x + w/2, y + p.h - 2); ctx.stroke();
          ctx.beginPath(); ctx.moveTo(x + 6, y + p.h/2); ctx.lineTo(x + w - 6, y + p.h/2); ctx.stroke();
        }
        if (p.name.includes("Bun")) {
          ctx.fillStyle = "rgba(180,130,30,0.55)";
          [[0.22,0.3,3,2],[0.48,0.2,3,1.5],[0.68,0.4,2.5,1.5],[0.38,0.55,2.5,1.5]].forEach(([fx,fy,rx2,ry2]) => {
            ctx.beginPath(); ctx.ellipse(x + fx*w, y + fy*p.h, rx2, ry2, 0.4, 0, Math.PI*2); ctx.fill();
          });
        }
        ctx.shadowBlur = 0; ctx.restore();
      }

      function placeBurgerLayer() {
        if (!running) return;
        const top = burgerLayers[burgerLayers.length - 1];
        const oLeft = Math.max(burgerSlider.x, top.x);
        const oRight = Math.min(burgerSlider.x + burgerSlider.w, top.x + top.w);
        const oW = oRight - oLeft;
        if (oW <= 0) return finish("Dropped it!");
        const p = burgerParts[burgerPartIdx % burgerParts.length];
        const newY = top.y - p.h - 3;
        burgerLayers.push({ x: oLeft, w: oW, y: newY, partIdx: burgerPartIdx });
        const precision = oW / top.w;
        const pts = Math.round(180 * precision);
        score += pts; scoreEl.textContent = score;
        addScorePop(180, newY + burgerCamY - 10, precision > 0.9 ? "PERFECT!" : precision > 0.7 ? "GREAT!" : "OK!", precision > 0.9 ? "#04f529" : "#ffc832");
        burgerPartIdx++;
        const newPart = burgerParts[burgerPartIdx % burgerParts.length];
        burgerSlider = { x: Math.random() < 0.5 ? 0 : 360 - oW, w: oW, dir: Math.random() < 0.5 ? 1 : -1, speed: Math.min(300, 130 + burgerLayers.length * 8) };
        // Camera: keep top layer near y=220
        burgerTargetCamY = Math.max(0, -(newY - 220));
      }

      function spawnTrafficWave() {
        const safeLane = Math.floor(Math.random() * 3);
        const lanes = [0, 1, 2].filter((value) => value !== safeLane);
        const count = Math.random() < 0.72 ? 2 : 1;
        lanes.sort(() => Math.random() - 0.5).slice(0, count).forEach((value) => {
          obstacles.push({ lane: value, y: -80, type: "car", color: value % 2 ? "#ffffff" : "#ff3d66" });
        });
      }

      function spawnRunnerObstacle() {
        const safeLane = Math.floor(Math.random() * 3);
        [0, 1, 2].filter((value) => value !== safeLane).slice(0, Math.random() < 0.58 ? 1 : 2).forEach((value) => {
          obstacles.push({ lane: value, y: -50, type: Math.random() < 0.32 ? "boost" : "barrier" });
        });
      }

      function drawMemory() {
        const bg = ctx.createLinearGradient(0, 0, 360, 520);
        bg.addColorStop(0, "#071512");
        bg.addColorStop(0.48, "#080a15");
        bg.addColorStop(1, "#101117");
        ctx.fillStyle = bg;
        ctx.fillRect(0, 0, 360, 520);

        ctx.fillStyle = "rgba(4,245,41,.12)";
        ctx.beginPath();
        ctx.arc(76, 118, 92, 0, Math.PI * 2);
        ctx.fill();
        ctx.fillStyle = "rgba(37,167,255,.10)";
        ctx.beginPath();
        ctx.arc(310, 384, 96, 0, Math.PI * 2);
        ctx.fill();

        ctx.fillStyle = "white";
        ctx.font = "900 25px sans-serif";
        ctx.fillText(memoryPhase === "show" ? "Study tower" : memoryWrong ? "Wrong block" : "Repeat it", 72, 42);
        ctx.fillStyle = "rgba(255,255,255,.68)";
        ctx.font = "800 13px sans-serif";
        const sub = memoryWrong ? `Correct color was ${memoryWrong.name}` : memoryPhase === "show" ? `${Math.ceil(memoryPhaseTimer)}s to memorise` : `${memoryIndex}/${memorySequence.length} matched`;
        ctx.fillText(sub, 88, 65);

        const towerX = 62;
        const towerTop = 116;
        const cubeSize = 43;
        const cubeDepth = 14;
        const cubeStep = 39;
        ctx.shadowBlur = 34;
        ctx.shadowColor = "rgba(4,245,41,.22)";
        ctx.fillStyle = "rgba(255,255,255,.07)";
        roundRect(24, 88, 172, 360, 28);
        ctx.fill();
        ctx.shadowBlur = 0;
        ctx.fillStyle = "rgba(0,0,0,.28)";
        roundRect(46, 424, 132, 22, 16);
        ctx.fill();

        [...memorySequence].map((colorIndex, row) => ({ colorIndex, row })).reverse().forEach(({ colorIndex, row }) => {
          const color = memoryColors[colorIndex];
          const yBlock = towerTop + row * cubeStep;
          const reveal = memoryPhase === "show" || memoryWrong?.row === row || row < memoryIndex;
          drawBlockCube(towerX, yBlock, cubeSize, cubeDepth, color.color, String(row + 1), reveal, memoryWrong?.row === row);
        });

        memoryColors.forEach((item, index) => {
          const col = index % 2;
          const row = Math.floor(index / 2);
          const x = 230 + col * 58;
          const yPalette = 130 + row * 74;
          const active = memoryWrong?.index === index;
          drawBlockCube(x, yPalette, 36, 10, item.color, "", true, active);
          ctx.fillStyle = "#ffffff";
          ctx.font = "900 8px sans-serif";
          ctx.textAlign = "center";
          ctx.fillText(item.name.toUpperCase(), x + 23, yPalette + 52);
          ctx.textAlign = "left";
        });
      }

      function tick(now) {
        if (!running) return;
        const dt = Math.min(0.05, (now - last) / 1000 || 0.016);
        last = now;
        timeLeft = Math.max(0, timeLeft - dt);
        score += Math.round(dt * (mode === "car" ? 46 : 28));
        scoreEl.textContent = score;
        timeEl.textContent = `${timeLeft.toFixed(1)}s`;
        if (timeLeft <= 0) return finish("Complete");

        if (mode === "dino") {
          // Sky gradient — sunset orange into deep purple night
          const skyG = ctx.createLinearGradient(0, 0, 0, 320);
          skyG.addColorStop(0, "#0d0625");
          skyG.addColorStop(0.38, "#2b0d42");
          skyG.addColorStop(0.72, "#8b2a14");
          skyG.addColorStop(1, "#c44a18");
          ctx.fillStyle = skyG; ctx.fillRect(0, 0, 360, 320);
          // Stars
          ctx.fillStyle = "rgba(255,255,255,0.72)";
          [[28,18],[72,9],[130,24],[188,6],[250,14],[310,22],[340,8],[54,38],[168,32],[296,30],[16,50],[84,55],[220,44],[330,48]].forEach(([sx,sy]) => {
            ctx.beginPath(); ctx.arc(sx, sy, 0.7, 0, Math.PI*2); ctx.fill();
          });
          // Moon
          ctx.save();
          ctx.shadowBlur = 28; ctx.shadowColor = "rgba(255,230,160,0.7)";
          ctx.fillStyle = "#ffe8a0";
          ctx.beginPath(); ctx.arc(310, 56, 20, 0, Math.PI*2); ctx.fill();
          ctx.fillStyle = "#2b0d42"; ctx.beginPath(); ctx.arc(320, 50, 16, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 0; ctx.restore();
          // Far hills (dark purple silhouette)
          ctx.fillStyle = "#1a0838";
          ctx.beginPath(); ctx.moveTo(0, 300);
          [0,40,80,100,140,180,220,260,300,340,360].forEach((hx, i) => {
            const hy = 230 + Math.sin(hx * 0.031 + 1.2) * 38 + Math.sin(hx * 0.017) * 24;
            ctx.lineTo(hx, hy);
          });
          ctx.lineTo(360, 320); ctx.lineTo(0, 320); ctx.closePath(); ctx.fill();
          // Near hills (deep red-brown)
          ctx.fillStyle = "#3a0c08";
          ctx.beginPath(); ctx.moveTo(0, 340);
          [0,60,120,180,240,300,360].forEach((hx) => {
            const hy = 300 + Math.sin(hx * 0.027 + roadOffset * 0.008) * 28 + Math.sin(hx * 0.051) * 16;
            ctx.lineTo(hx, hy);
          });
          ctx.lineTo(360, 360); ctx.lineTo(0, 360); ctx.closePath(); ctx.fill();
          // Ground fill
          const gGrad = ctx.createLinearGradient(0, 440, 0, 520);
          gGrad.addColorStop(0, "#1e1008"); gGrad.addColorStop(0.4, "#110a04"); gGrad.addColorStop(1, "#06030100");
          ctx.fillStyle = gGrad; ctx.fillRect(0, 440, 360, 80);
          // Ground line glow
          ctx.save();
          ctx.shadowBlur = 14; ctx.shadowColor = "rgba(255,120,30,0.7)";
          ctx.fillStyle = "#f07820"; ctx.fillRect(0, 438, 360, 3);
          ctx.shadowBlur = 0; ctx.restore();
          // Ground detail dashes
          ctx.fillStyle = "rgba(240,120,32,0.15)";
          for (let gx = (roadOffset * 1.4) % 52; gx < 360; gx += 52) ctx.fillRect(gx, 445, 34, 3);

          runnerStep += dt * 16;
          vy += 1200 * dt;
          y = Math.min(430, y + vy * dt);
          if (y >= 430 && vy > 0) vy = 0;
          spawnTimer -= dt;
          if (spawnTimer <= 0) {
            const diffScale = Math.min(1, score / 800); // ramp up difficulty gradually
            obstacles.push({ x: 380, y: 418, w: 26 + Math.random() * 18, h: 38 + diffScale * Math.random() * 28 });
            spawnTimer = Math.max(0.55, 1.1 - score / 2800);
          }
          obstacles.forEach((o) => { o.x -= (380 + score / 12) * dt; });
          drawDinoRunner(76, y, y < 430);
          obstacles.forEach((o) => drawWoodBlock(o));
          if (obstacles.some((o) => o.x < 94 && o.x + o.w > 60 && y + 14 > o.y)) return finish("Hit");
        } else if (mode === "boxball") {
          drawBackground("#06100f");
          const speedBoost = 1 + score / 5000;
          ball.x += ball.vx * dt * speedBoost;
          ball.y += ball.vy * dt * speedBoost;
          if (ball.x < 50 || ball.x > 310 || ball.y < 105 || ball.y > 455) return finish("Edge hit");
          ctx.strokeStyle = "#04f529";
          ctx.lineWidth = 5;
          roundRect(35, 90, 290, 380, 22);
          ctx.stroke();
          ctx.fillStyle = "rgba(4,245,41,.08)";
          ctx.fill();
          ctx.shadowBlur = 22;
          ctx.shadowColor = "#04f529";
          ctx.fillStyle = cfg.player;
          ctx.beginPath();
          ctx.arc(ball.x, ball.y, 18, 0, Math.PI * 2);
          ctx.fill();
          ctx.shadowBlur = 0;
        } else if (mode === "color") {
          const bg = ctx.createLinearGradient(0, 0, 360, 520);
          bg.addColorStop(0, "#061312");
          bg.addColorStop(0.52, "#0b1320");
          bg.addColorStop(1, "#050607");
          ctx.fillStyle = bg;
          ctx.fillRect(0, 0, 360, 520);
          ctx.fillStyle = "rgba(255,255,255,.06)";
          roundRect(34, 112, 292, 318, 30);
          ctx.fill();
          colorTimer -= dt;
          if (colorTimer <= 0) {
            if (lane !== targetLane) return finish("Missed");
            score += 90;
            targetLane = Math.floor(Math.random() * 3);
            colorTimer = Math.max(0.55, 1.1 - score / 4000);
          }
          const laneColors = ["#1d6ff2", "#22c55e", "#f43f5e"];
          [0, 1, 2].forEach((value) => {
            const x = laneX(value) - 34;
            const isTarget = value === targetLane;
            const fill = ctx.createLinearGradient(x, 140, x + 68, 392);
            fill.addColorStop(0, isTarget ? laneColors[value] : "rgba(255,255,255,.18)");
            fill.addColorStop(1, isTarget ? shadeColor(laneColors[value], -52) : "rgba(255,255,255,.07)");
            ctx.shadowBlur = isTarget ? 22 : 0;
            ctx.shadowColor = isTarget ? laneColors[value] : "transparent";
            ctx.fillStyle = fill;
            roundRect(x, 140, 68, 268, 22);
            ctx.fill();
            ctx.shadowBlur = 0;
            ctx.strokeStyle = isTarget ? "rgba(255,255,255,.7)" : "rgba(255,255,255,.14)";
            ctx.lineWidth = isTarget ? 3 : 1.5;
            ctx.stroke();
          });
          const playerGlow = ctx.createRadialGradient(laneX(lane), 434, 6, laneX(lane), 434, 38);
          playerGlow.addColorStop(0, "#ffffff");
          playerGlow.addColorStop(1, "rgba(255,255,255,.08)");
          ctx.fillStyle = playerGlow;
          roundRect(laneX(lane) - 27, 410, 54, 54, 18);
          ctx.fill();
        } else if (mode === "tunnel") {
          // Background
          ctx.fillStyle = "#020408"; ctx.fillRect(0, 0, 360, 520);
          tunnelOffset += (220 + score / 7) * dt;
          // Physics: hold = float up, release = fall
          if (tunnelHolding) { tunnelVY += (-280 - tunnelVY) * Math.min(1, dt * 10); }
          else { tunnelVY += 700 * dt; }
          tunnelVY = Math.max(-350, Math.min(460, tunnelVY));
          tunnelY += tunnelVY * dt;
          tunnelY = Math.max(10, Math.min(510, tunnelY));
          // Tunnel walls (winding corridor)
          const halfW = Math.max(38, 76 - score / 300);
          for (let sx = 0; sx <= 360; sx += 3) {
            const wx = tunnelOffset + sx;
            const cy = 260 + 70 * Math.sin(wx * 0.021) + 34 * Math.sin(wx * 0.053 + 1.15) + 16 * Math.sin(wx * 0.011 + 0.4);
            const topEdge = cy - halfW; const botEdge = cy + halfW;
            ctx.fillStyle = "#090322"; ctx.fillRect(sx, 0, 3, Math.max(0, topEdge - 4));
            ctx.fillStyle = "rgba(100,28,240,0.72)"; ctx.fillRect(sx, Math.max(0, topEdge - 5), 3, 6);
            ctx.fillStyle = "#090322"; ctx.fillRect(sx, Math.min(520, botEdge + 4), 3, Math.max(0, 520 - botEdge - 4));
            ctx.fillStyle = "rgba(100,28,240,0.72)"; ctx.fillRect(sx, Math.min(514, botEdge - 1), 3, 6);
          }
          // Collision check (with grace period)
          tunnelGrace = Math.max(0, tunnelGrace - dt);
          const bwx = tunnelOffset + 80;
          const bcy = 260 + 70 * Math.sin(bwx * 0.021) + 34 * Math.sin(bwx * 0.053 + 1.15) + 16 * Math.sin(bwx * 0.011 + 0.4);
          if (tunnelGrace > 0) { tunnelY += (bcy - tunnelY) * Math.min(1, dt * 6); tunnelVY = 0; }
          else if (tunnelY < bcy - halfW + 10 || tunnelY > bcy + halfW - 10) return finish("Wall Hit!");
          // Speed streaks
          ctx.save(); ctx.globalAlpha = 0.06 * Math.min(1, score / 400);
          ctx.strokeStyle = "#04f529"; ctx.lineWidth = 1;
          for (let i = 0; i < 5; i++) {
            const lx = (i * 72 - (tunnelOffset * 0.4) % 360 + 360) % 360;
            ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx + 10, 520); ctx.stroke();
          }
          ctx.restore();
          // Ball with glow + trail
          ctx.save();
          ctx.globalAlpha = 0.14; ctx.fillStyle = "#04f529";
          ctx.beginPath(); ctx.arc(54, tunnelY - tunnelVY * 0.036, 5, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 0.3;
          ctx.beginPath(); ctx.arc(67, tunnelY - tunnelVY * 0.018, 7, 0, Math.PI*2); ctx.fill();
          ctx.globalAlpha = 1; ctx.shadowBlur = 28; ctx.shadowColor = "#04f529";
          ctx.fillStyle = "#04f529"; ctx.beginPath(); ctx.arc(80, tunnelY, 10, 0, Math.PI*2); ctx.fill();
          ctx.shadowBlur = 12; ctx.shadowColor = "#fff"; ctx.fillStyle = "rgba(255,255,255,0.9)";
          ctx.beginPath(); ctx.arc(76, tunnelY - 3.5, 3.5, 0, Math.PI*2); ctx.fill();
          ctx.restore();
          updateDrawScorePops(dt);
        } else if (mode === "burger") {
          burgerCamY += (burgerTargetCamY - burgerCamY) * Math.min(1, dt * 6);
          drawBurgerBg();
          // Ingredient label at top
          const nextPart = burgerParts[burgerPartIdx % burgerParts.length];
          ctx.fillStyle = "rgba(255,255,255,0.92)"; ctx.font = "900 17px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
          ctx.fillText(`Drop the ${nextPart.name}!`, 180, 36);
          ctx.font = "700 12px sans-serif"; ctx.fillStyle = "rgba(255,255,255,0.5)";
          ctx.fillText(`${burgerLayers.length - 1} layers stacked`, 180, 58);
          ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
          // Plate
          const topLayer = burgerLayers[burgerLayers.length - 1];
          drawBurgerIngredient(burgerLayers[0].x, burgerLayers[0].y + burgerCamY, burgerLayers[0].w, -1, false);
          // Draw all placed layers (skip plate/base)
          burgerLayers.forEach((b, i) => {
            if (i === 0) return;
            const drawY = b.y + burgerCamY;
            if (drawY > -60 && drawY < 560) drawBurgerIngredient(b.x, drawY, b.w, b.partIdx, false);
          });
          // Moving slider
          burgerSlider.x += burgerSlider.dir * burgerSlider.speed * dt;
          if (burgerSlider.x <= 0) { burgerSlider.x = 0; burgerSlider.dir = 1; }
          if (burgerSlider.x + burgerSlider.w >= 360) { burgerSlider.x = 360 - burgerSlider.w; burgerSlider.dir = -1; }
          const sliderDrawY = topLayer.y - nextPart.h - 46 + burgerCamY;
          drawBurgerIngredient(burgerSlider.x, sliderDrawY, burgerSlider.w, burgerPartIdx, true);
          // Perfect alignment glow
          const acc = Math.max(0, Math.min(burgerSlider.x + burgerSlider.w, topLayer.x + topLayer.w) - Math.max(burgerSlider.x, topLayer.x)) / topLayer.w;
          if (acc > 0.88) {
            ctx.save(); ctx.globalAlpha = 0.55; ctx.strokeStyle = "#04f529"; ctx.lineWidth = 2;
            roundRect(burgerSlider.x - 2, sliderDrawY - 2, burgerSlider.w + 4, nextPart.h + 4, 4); ctx.stroke();
            ctx.restore();
          }
          updateDrawScorePops(dt);
        } else if (mode === "memory") {
          memoryPhaseTimer -= dt;
          if (memoryPhase === "show" && memoryPhaseTimer <= 0) {
            memoryPhase = "input";
            status.textContent = "Repeat";
          }
          drawMemory();
        } else {
          drawBackground();
          drawNeonRoad();
          drawSpeedLines(dt, score);
          spawnTimer -= dt;
          if (spawnTimer <= 0) {
            spawnTrafficWave();
            spawnTimer = Math.max(0.48, 0.72 - score / 6500);
          }
          obstacles.forEach((o) => { o.y += (330 + score / 20) * dt; });
          updateParticles(dt);
          drawParticles();
          const pg = ctx.createRadialGradient(laneX(lane), 430, 0, laneX(lane), 430, 54);
          pg.addColorStop(0, "rgba(4,245,41,0.14)");
          pg.addColorStop(1, "rgba(4,245,41,0)");
          ctx.fillStyle = pg;
          ctx.fillRect(laneX(lane) - 54, 376, 108, 108);
          if (Math.random() < 0.55) addParticle(laneX(lane) + (Math.random() - 0.5) * 18, 463, "rgba(4,245,41,0.72)", 18, 18, 2.2);
          drawCar(laneX(lane), 430, cfg.player, 1, true);
          obstacles.forEach((o) => drawCar(laneX(o.lane), o.y, o.color, 0.94));
          updateDrawScorePops(dt);
          if (obstacles.some((o) => o.lane === lane && o.y > 360 && o.y < 492)) {
            addExplosion(laneX(lane), 430, cfg.player);
            addScorePop(laneX(lane), 390, "CRASH!", "#ff3d66");
            return finish("Crash");
          }
        }
        obstacles = obstacles.filter((o) => (o.y || 0) < 570 && (o.x || 0) > -80);
        rafId = requestAnimationFrame(tick);
      }

      function move(dir) {
        if (mode === "dino") {
          if (y >= 428) { vy = -360; }
          return;
        }
        if (mode === "tunnel") {
          tunnelHolding = true;
          return;
        }
        if (mode === "burger") {
          placeBurgerLayer();
          return;
        }
        if (mode === "boxball") {
          ball.vx += dir * 70;
          ball.vy += -18;
          return;
        }
        lane = Math.max(0, Math.min(2, lane + dir));
      }

      function canvasPoint(event) {
        const rect = canvas.getBoundingClientRect();
        const touch = event.touches?.[0] || event.changedTouches?.[0] || event;
        return {
          x: (touch.clientX - rect.left) * (stageWidth / rect.width),
          y: (touch.clientY - rect.top) * (stageHeight / rect.height)
        };
      }

      function handleCanvasDown(event) {
        if (mode === "dino") return move(0);
        if (mode === "tunnel") { tunnelHolding = true; return; }
        if (mode === "burger") { event.preventDefault(); return placeBurgerLayer(); }
        if (mode === "memory" && running) {
          event.preventDefault();
          if (memoryPhase !== "input") return;
          const point = canvasPoint(event);
          const pickedIndex = memoryColors.findIndex((item, index) => {
            const col = index % 2;
            const row = Math.floor(index / 2);
            const x = 226 + col * 58;
            const yPalette = 104 + row * 67;
            return point.x >= x - 6 && point.x <= x + 54 && point.y >= yPalette && point.y <= yPalette + 66;
          });
          if (pickedIndex < 0) return;
          const correctIndex = memorySequence[memoryIndex];
          if (pickedIndex !== correctIndex) {
            memoryWrong = { ...memoryColors[correctIndex], index: correctIndex, row: memoryIndex };
            drawMemory();
            return finish(`Wrong: ${memoryWrong.name}`);
          }
          memoryIndex += 1;
          score += 160 + Math.round(timeLeft * 10);
          scoreEl.textContent = score;
          if (memoryIndex >= memorySequence.length) {
            memorySequence = [...memoryColors.keys()].sort(() => Math.random() - 0.5);
            memoryIndex = 0;
            memoryShowIndex = 0;
            memoryPhase = "show";
            memoryPhaseTimer = 8.0;
            status.textContent = "Watch";
          }
          return;
        }
        if (mode === "boxball" && running) {
          event.preventDefault();
          const point = canvasPoint(event);
          draggingBall = Math.hypot(point.x - ball.x, point.y - ball.y) < 70;
          if (draggingBall) {
            ball.x = Math.max(52, Math.min(308, point.x));
            ball.y = Math.max(107, Math.min(453, point.y));
          }
        }
      }

      function handleCanvasMove(event) {
        if (mode !== "boxball" || !draggingBall || !running) return;
        event.preventDefault();
        const point = canvasPoint(event);
        ball.vx = (point.x - ball.x) * 9;
        ball.vy = (point.y - ball.y) * 9;
        ball.x = Math.max(52, Math.min(308, point.x));
        ball.y = Math.max(107, Math.min(453, point.y));
      }

      function handleCanvasUp() {
        draggingBall = false;
        if (mode === "tunnel") tunnelHolding = false;
      }

      canvas.addEventListener("pointerdown", handleCanvasDown);
      canvas.addEventListener("pointermove", handleCanvasMove);
      canvas.addEventListener("pointerup", handleCanvasUp);
      canvas.addEventListener("pointercancel", handleCanvasUp);
      start.addEventListener("click", () => { dismissIntro(); reset(); });
      left.addEventListener("click", () => move(-1));
      right.addEventListener("click", () => move(1));
      addEventListener("keydown", (event) => {
        if (event.key === "ArrowLeft") move(-1);
        if (event.key === "ArrowRight") move(1);
        if (event.key === " " || event.key === "ArrowUp") move(0);
      });
      addEventListener("keyup", (event) => {
        if ((event.key === " " || event.key === "ArrowUp") && mode === "tunnel") tunnelHolding = false;
      });
      if (mode === "dino" || mode === "memory" || mode === "tunnel" || mode === "burger") { left.hidden = true; right.hidden = true; }
      if (mode === "memory") {
        memorySequence = [...memoryColors.keys()];
        memoryPhase = "show";
        memoryPhaseTimer = 10.0;
        drawMemory();
        status.textContent = "Ready";
        timeEl.textContent = "30.0s";
      } else if (mode === "tunnel") {
        ctx.fillStyle = "#020408"; ctx.fillRect(0, 0, 360, 520);
        for (let sx = 0; sx <= 360; sx += 3) {
          const cy = 260 + 70 * Math.sin(sx * 0.021) + 34 * Math.sin(sx * 0.053 + 1.15);
          ctx.fillStyle = "#090322"; ctx.fillRect(sx, 0, 3, Math.max(0, cy - 76));
          ctx.fillStyle = "#090322"; ctx.fillRect(sx, Math.min(520, cy + 76), 3, Math.max(0, 520 - cy - 76));
          ctx.fillStyle = "rgba(100,28,240,0.72)"; ctx.fillRect(sx, Math.max(0, cy - 77), 3, 5);
          ctx.fillStyle = "rgba(100,28,240,0.72)"; ctx.fillRect(sx, Math.min(515, cy + 76), 3, 5);
        }
        ctx.save(); ctx.shadowBlur = 28; ctx.shadowColor = "#04f529"; ctx.fillStyle = "#04f529";
        ctx.beginPath(); ctx.arc(80, 260, 10, 0, Math.PI*2); ctx.fill(); ctx.restore();
        ctx.fillStyle = "rgba(255,255,255,0.75)"; ctx.font = "700 16px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("Hold to float up — release to drop", 180, 460);
        ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      } else if (mode === "burger") {
        drawBurgerBg();
        drawBurgerIngredient(80, 490, 200, -1, false);
        ctx.fillStyle = "rgba(255,255,255,0.85)"; ctx.font = "700 18px sans-serif"; ctx.textAlign = "center"; ctx.textBaseline = "middle";
        ctx.fillText("Tap to stack ingredients!", 180, 200);
        ctx.textAlign = "left"; ctx.textBaseline = "alphabetic";
      } else if (mode === "car") {
        drawBackground();
        drawNeonRoad();
      } else if (mode === "dino") {
        const idleSky = ctx.createLinearGradient(0, 0, 0, 320);
        idleSky.addColorStop(0, "#0d0625"); idleSky.addColorStop(0.4, "#2b0d42");
        idleSky.addColorStop(0.75, "#8b2a14"); idleSky.addColorStop(1, "#c44a18");
        ctx.fillStyle = idleSky; ctx.fillRect(0, 0, 360, 320);
        ctx.fillStyle = "#1a0838"; ctx.fillRect(0, 300, 360, 40);
        ctx.fillStyle = "#3a0c08"; ctx.fillRect(0, 330, 360, 110);
        ctx.save(); ctx.shadowBlur = 14; ctx.shadowColor = "rgba(255,120,30,0.7)";
        ctx.fillStyle = "#f07820"; ctx.fillRect(0, 438, 360, 3);
        ctx.shadowBlur = 0; ctx.restore();
        drawDinoRunner(76, 430, false);
      } else {
        drawBackground();
      }
    })();
  </script>
</body>
